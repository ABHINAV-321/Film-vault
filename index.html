<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FILMVAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#060608;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#0a0a0f}
  ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
  .hide-scroll::-webkit-scrollbar{display:none}
  .hide-scroll{-ms-overflow-style:none;scrollbar-width:none}

  /* NAV */
  nav{position:sticky;top:0;z-index:200;background:linear-gradient(to bottom,rgba(6,6,8,1),rgba(6,6,8,.9));backdrop-filter:blur(14px);border-bottom:1px solid #111;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#e50914;letter-spacing:4px;text-shadow:0 0 30px rgba(229,9,20,.4);white-space:nowrap;flex-shrink:0}
  .nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .search-wrap{position:relative}
  .search-input{width:220px;padding:8px 34px 8px 14px;background:rgba(255,255,255,.07);border:1px solid #2a2a2a;border-radius:20px;color:#fff;font-size:13px;outline:none;transition:border .2s}
  .search-input:focus{border-color:#e50914}
  .search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;font-size:15px;cursor:pointer;padding:0;line-height:1}
  .clear-btn{font-size:12px;color:#666;cursor:pointer;background:none;border:none;white-space:nowrap;padding:4px 8px}

  /* HERO */
  .hero{position:relative;height:500px;border-radius:16px;overflow:hidden;background:#111;margin-bottom:40px}
  .hero img.bg{width:100%;height:100%;object-fit:cover;object-position:center 20%}
  .hero-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(6,6,8,.97) 30%,rgba(6,6,8,.1) 100%),linear-gradient(to top,rgba(6,6,8,1) 0%,transparent 55%)}
  .hero-content{position:absolute;bottom:0;left:0;padding:0 44px 44px;max-width:560px;width:100%}
  .hero-label{font-size:10px;letter-spacing:4px;color:#e50914;text-transform:uppercase;margin-bottom:8px}
  .hero-title{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:10px;text-shadow:0 2px 20px rgba(0,0,0,.8)}
  .hero-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .hero-overview{font-size:13px;color:#bbb;line-height:1.75;margin-bottom:20px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-btns{display:flex;gap:10px;flex-wrap:wrap}
  .btn-red{padding:10px 22px;background:#e50914;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.8px;transition:background .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn-red:hover{background:#ff1f1f}
  .btn-ghost{padding:10px 18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;backdrop-filter:blur(4px);transition:background .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn-ghost:hover{background:rgba(255,255,255,.2)}

  /* SECTIONS */
  .section{margin-bottom:40px}
  .section-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:14px}
  .row-wrap{position:relative;padding:0 4px}
  .row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;padding-top:4px}
  .row-btn{position:absolute;top:50%;transform:translateY(-60%);z-index:10;background:rgba(6,6,8,.92);border:1px solid #2a2a2a;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:19px;transition:background .2s}
  .row-btn:hover{background:#e50914;border-color:#e50914}
  .row-btn.left{left:-10px}
  .row-btn.right{right:-10px}

  /* CARD */
  .card{flex:0 0 140px;width:140px;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;background:#111;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
  .card:hover{transform:scale(1.06) translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,.9),0 0 0 2px rgba(229,9,20,.3)}
  .card img{width:100%;height:210px;object-fit:cover;display:block}
  .card-no-img{width:100%;height:210px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;text-align:center;padding:10px;line-height:1.4}
  .card-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.82);border-radius:5px;padding:2px 6px;font-size:10px;color:#f5c518;backdrop-filter:blur(4px);z-index:3}
  .card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.97) 0%,rgba(0,0,0,.08) 55%,transparent 100%);opacity:0;transition:opacity .22s;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 9px 11px;z-index:2}
  .card:hover .card-overlay,.card.touched .card-overlay{opacity:1}
  .card-title{font-size:11px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px}
  .card-info{display:flex;align-items:center;gap:5px;margin-bottom:6px}
  .card-watch{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;background:linear-gradient(135deg,#e50914,#ff4500);border-radius:5px;color:#fff;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.4px;border:none;transition:opacity .2s}
  .card-watch:hover{opacity:.85}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
  .modal-box{background:#0f0f17;border-radius:18px;max-width:860px;width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 120px rgba(0,0,0,.95);border:1px solid #1e1e2e}
  .modal-img-wrap{position:relative;height:200px;background:#111;flex-shrink:0}
  .modal-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
  .modal-img-grad{position:absolute;inset:0;background:linear-gradient(to top,#0f0f17 0%,transparent 65%)}
  .modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.88);border:2px solid #555;border-radius:50%;width:38px;height:38px;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:999}
  .modal-close:hover{background:#e50914}
  .modal-close:hover{background:#e50914}
  .modal-scroll{overflow-y:auto;padding:0 24px 28px;flex-grow:1}
  .modal-head{display:flex;gap:16px;margin-top:16px;margin-bottom:18px;align-items:flex-start}
  .modal-poster{width:96px;height:144px;object-fit:cover;border-radius:9px;border:2px solid #222;flex-shrink:0}
  .modal-poster-ph{width:96px;height:144px;background:#1e1e2e;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
  .modal-title{font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:7px;line-height:1.2}
  .modal-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .badge-imdb{background:#f5c518;color:#000;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:900;text-decoration:none}
  .badge-trailer{background:#333;color:#fff;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;text-decoration:none}
  .genre-chip{background:#1e1e2e;border:1px solid #2a2a3a;border-radius:4px;padding:2px 9px;font-size:11px;color:#aaa}
  .watch-big{display:inline-flex;align-items:center;gap:8px;padding:11px 28px;background:linear-gradient(135deg,#e50914,#ff4500);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:800;letter-spacing:.8px;cursor:pointer;text-decoration:none;box-shadow:0 6px 22px rgba(229,9,20,.45);transition:all .2s;margin-top:12px}
  .watch-big:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(229,9,20,.65)}
  .tabs{display:flex;gap:2px;border-bottom:1px solid #1e1e2e;margin-bottom:18px;overflow-x:auto}
  .tab{padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;color:#666;cursor:pointer;font-size:13px;font-weight:600;text-transform:capitalize;transition:color .2s;white-space:nowrap}
  .tab.active{color:#fff;border-bottom-color:#e50914}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .info-box{background:#141420;border-radius:8px;padding:10px 13px;border:1px solid #1e1e2e}
  .info-label{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
  .info-val{font-size:13px;color:#ccc}
  .cast-grid{display:flex;gap:10px;flex-wrap:wrap}
  .cast-item{width:72px;text-align:center}
  .cast-img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #222}
  .cast-ph{width:56px;height:56px;border-radius:50%;background:#1e1e2e;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto}
  .cast-name{font-size:10px;color:#ccc;margin-top:4px;line-height:1.3}
  .cast-char{font-size:9px;color:#555;margin-top:2px}
  .img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px}
  .img-grid img{width:100%;height:96px;object-fit:cover;border-radius:6px}
  .loader{text-align:center;padding:80px;color:#333;font-size:13px;letter-spacing:2px}
  .search-grid{display:flex;gap:10px;flex-wrap:wrap}

  footer{padding:24px 32px;border-top:1px solid #111;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  footer span{font-size:11px;color:#444;text-align:center}

  /* MOBILE */
  @media(max-width:600px){
    nav{padding:0 14px;height:54px}
    .logo{font-size:17px;letter-spacing:2px}
    .search-input{width:130px;font-size:12px}
    #app{padding:14px 14px 50px!important}
    .hero{height:300px;border-radius:10px;margin-bottom:24px}
    .hero-grad{background:linear-gradient(to top,rgba(6,6,8,1) 0%,rgba(6,6,8,.65) 50%,rgba(6,6,8,.1) 100%)}
    .hero-content{padding:0 14px 18px;max-width:100%}
    .hero-title{font-size:20px;margin-bottom:6px}
    .hero-overview{display:none}
    .hero-meta{gap:6px;margin-bottom:8px}
    .hero-btns{gap:8px}
    .btn-red,.btn-ghost{padding:8px 13px;font-size:11px}
    .card{flex:0 0 110px;width:110px}
    .card img,.card-no-img{height:165px}
    .card-badge{display:none}
    /* always-visible rating strip at bottom on mobile */
    .card-overlay{opacity:1;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 65%)}
    .card-watch{font-size:9px;padding:3px 8px}
    .row-btn{display:none}
    .row{padding:0 2px 8px;gap:8px}
    .row-wrap{padding:0}
    .section-title{font-size:14px;margin-bottom:10px}
    .section{margin-bottom:26px}
    .modal-bg{padding:0;align-items:flex-end}
    .modal-box{border-radius:18px 18px 0 0;max-height:94vh;width:100%}
    .modal-close{position:fixed;top:14px;right:14px;z-index:9999;background:rgba(20,20,30,.95);border:2px solid #666;width:40px;height:40px;font-size:18px}
    .modal-img-wrap{height:160px}
    .modal-scroll{padding:0 14px 24px}
    .modal-head{flex-direction:column;align-items:flex-start;gap:10px;margin-top:0;padding-top:14px;margin-bottom:14px}
    .modal-poster,.modal-poster-ph{width:64px;height:96px;display:none}
    .modal-title{font-size:17px;margin-bottom:6px}
    .modal-meta{gap:5px;font-size:11px}
    .watch-big{padding:9px 18px;font-size:12px;margin-top:8px}
    .info-grid{grid-template-columns:1fr}
    .img-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
    footer{padding:16px}
  }

  /* TABLET */
  @media(min-width:601px) and (max-width:900px){
    nav{padding:0 20px}
    .search-input{width:170px}
    #app{padding:20px 20px 50px!important}
    .hero{height:380px;border-radius:12px}
    .hero-content{padding:0 28px 30px}
    .hero-title{font-size:28px}
    .card{flex:0 0 125px;width:125px}
    .card img,.card-no-img{height:188px}
    .info-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<nav>
  <div class="logo">FILMVAULT</div>
  <div class="nav-right">
    <button id="clear-btn" class="clear-btn" style="display:none" onclick="clearSearch()">✕ Clear</button>
    <div class="search-wrap">
      <input class="search-input hide-scroll" id="search-input" placeholder="Search…" oninput="onSearch(this.value)" autocomplete="off"/>
      <button class="search-btn" onclick="document.getElementById('search-input').focus()">🔍</button>
    </div>
  </div>
</nav>

<div id="app" style="padding:28px 40px 60px"></div>

<div class="modal-bg" id="modal" style="display:none" onclick="closeBg(event)">
  <div class="modal-box" style="position:relative">
    <button class="modal-close" onclick="hideModal()" style="position:fixed;top:auto">✕</button>
    <div class="modal-img-wrap" id="modal-img">
      <div class="modal-img-grad"></div>
    </div>
    <div class="modal-scroll" id="modal-body">
      <div class="loader">Loading…</div>
    </div>
  </div>
</div>

<footer>
  <span>This product uses the TMDB API but is not endorsed or certified by TMDB.</span>
  <span style="color:#333">·</span>
  <span>Movies played via publicly available third-party sources. FILMVAULT does not host, store, or distribute any video content.</span>
</footer>

<script>
const TOKEN="eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJlYjk5MDQ0MDEyOTRjMzk1ZTFiOGYyNWJlYWRlNjU1NCIsIm5iZiI6MTc3OTA0MzUxNS45MDksInN1YiI6IjZhMGEwY2JiYmJjOWJmYjU2ZTc2N2YxNiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.8Bsg9zxJIeqRk8yeGWVcNHTvOZxf100C4CRzRU80WQ8";
const TBASE="https://api.themoviedb.org/3";
const IBASE="https://image.tmdb.org/t/p";

const SECTIONS=[
  {id:"td",label:"🔥 Trending Today",    url:"/trending/movie/day"},
  {id:"tw",label:"📈 Trending This Week", url:"/trending/movie/week"},
  {id:"pop",label:"⭐ Most Popular",       url:"/movie/popular"},
  {id:"top",label:"🏆 Top Rated",         url:"/movie/top_rated"},
  {id:"now",label:"🎬 Now Playing",       url:"/movie/now_playing"},
  {id:"up", label:"🚀 Upcoming",          url:"/movie/upcoming"},
  {id:"ac", label:"💥 Action",            url:"/discover/movie?with_genres=28&sort_by=popularity.desc"},
  {id:"co", label:"😂 Comedy",            url:"/discover/movie?with_genres=35&sort_by=popularity.desc"},
  {id:"ho", label:"👻 Horror",            url:"/discover/movie?with_genres=27&sort_by=popularity.desc"},
  {id:"sf", label:"🚀 Sci-Fi",            url:"/discover/movie?with_genres=878&sort_by=popularity.desc"},
  {id:"ro", label:"❤️ Romance",           url:"/discover/movie?with_genres=10749&sort_by=popularity.desc"},
  {id:"an", label:"🎨 Animation",         url:"/discover/movie?with_genres=16&sort_by=popularity.desc"},
  {id:"th", label:"🔪 Thriller",          url:"/discover/movie?with_genres=53&sort_by=popularity.desc"},
  {id:"do", label:"🎥 Documentary",       url:"/discover/movie?with_genres=99&sort_by=popularity.desc"},
];

const GM={28:"Action",12:"Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",14:"Fantasy",36:"History",27:"Horror",10402:"Music",9648:"Mystery",10749:"Romance",878:"Sci-Fi",53:"Thriller",10752:"War",37:"Western"};

async function api(path){
  const sep=path.includes("?")?"&":"?";
  const r=await fetch(`${TBASE}${path}${sep}language=en-US`,{
    headers:{Authorization:`Bearer ${TOKEN}`,"Content-Type":"application/json"}
  });
  return r.json();
}
const iurl=(p,s="w342")=>p?`${IBASE}/${s}${p}`:null;
const fmt=n=>n?Number(n).toFixed(1):"N/A";
const yr=d=>d?d.slice(0,4):"";
const rt=m=>m?`${Math.floor(m/60)}h ${m%60}m`:"";

const imdbCache={};

/* ── card ─────────────────────────────────────────────────────── */
function cardHtml(m){
  const poster=iurl(m.poster_path);
  const genres=(m.genre_ids||[]).map(id=>GM[id]).filter(Boolean).slice(0,2).join(" · ");
  return `
    <div class="card" onclick="openModal(${m.id})">
      ${poster
        ?`<img src="${poster}" alt="${(m.title||"").replace(/"/g,"")}" loading="lazy"/>`
        :`<div class="card-no-img">${m.title||""}</div>`}
      <div class="card-badge">★ ${fmt(m.vote_average)}</div>
      <div class="card-overlay">
        <div class="card-title">${m.title||""}</div>
        <div class="card-info">
          <span style="color:#f5c518;font-size:11px">★ ${fmt(m.vote_average)}</span>
          <span style="font-size:10px;color:#888">${yr(m.release_date)}</span>
        </div>
        ${genres?`<div style="font-size:9px;color:#666;margin-bottom:5px">${genres}</div>`:""}
        <div onclick="event.stopPropagation()">
          <button class="card-watch" onclick="watchNow(${m.id},this)">▶ Watch Now</button>
        </div>
      </div>
    </div>`;
}

/* ── section ──────────────────────────────────────────────────── */
function sectionHtml(label,id,movies){
  if(!movies.length) return"";
  return`
    <div class="section">
      <div class="section-title">${label}</div>
      <div class="row-wrap">
        <button class="row-btn left" onclick="scrollRow('${id}',-1)">‹</button>
        <div class="row hide-scroll" id="row-${id}">${movies.map(cardHtml).join("")}</div>
        <button class="row-btn right" onclick="scrollRow('${id}',1)">›</button>
      </div>
    </div>`;
}
function scrollRow(id,dir){document.getElementById(`row-${id}`)?.scrollBy({left:dir*580,behavior:"smooth"});}

/* ── hero ─────────────────────────────────────────────────────── */
function heroHtml(m){
  const bg=iurl(m.backdrop_path,"w1280");
  const genres=(m.genre_ids||[]).map(id=>GM[id]).filter(Boolean).slice(0,3);
  return`
    <div class="hero">
      ${bg?`<img class="bg" src="${bg}" alt=""/>`:""}
      <div class="hero-grad"></div>
      <div class="hero-content">
        <div class="hero-label">Featured Today</div>
        <div class="hero-title">${m.title||""}</div>
        <div class="hero-meta">
          ${genres.map(g=>`<span style="background:rgba(255,255,255,.1);border-radius:4px;padding:3px 9px;font-size:11px;color:#ccc">${g}</span>`).join("")}
          <span style="color:#f5c518;font-size:12px">★ ${fmt(m.vote_average)}</span>
          <span style="color:#888;font-size:12px">${yr(m.release_date)}</span>
        </div>
        <div class="hero-overview">${m.overview||""}</div>
        <div class="hero-btns">
          <button class="btn-red" onclick="watchNow(${m.id},this)">▶ Watch Now</button>
          <button class="btn-ghost" onclick="openModal(${m.id})">ℹ More Info</button>
        </div>
      </div>
    </div>`;
}

/* ── init ─────────────────────────────────────────────────────── */
async function init(){
  const app=document.getElementById("app");
  app.innerHTML='<div class="loader">Loading vault…</div>';
  const results=await Promise.all(
    SECTIONS.map(s=>{
      const sep=s.url.includes("?")?"&":"?";
      return api(`${s.url}${sep}page=1`).then(d=>[s.id,d.results||[]]).catch(()=>[s.id,[]]);
    })
  );
  const data=Object.fromEntries(results);
  const trend=data["td"]||[];
  const hero=trend[Math.floor(Math.random()*Math.min(5,trend.length))]||trend[0];
  let html=hero?heroHtml(hero):"";
  SECTIONS.forEach(s=>{html+=sectionHtml(s.label,s.id,data[s.id]||[]);});
  app.innerHTML=html;

  // mobile: tap card to reveal overlay
  document.querySelectorAll(".card").forEach(c=>{
    c.addEventListener("touchstart",()=>{
      document.querySelectorAll(".card.touched").forEach(x=>{if(x!==c)x.classList.remove("touched");});
      c.classList.toggle("touched");
    },{passive:true});
  });
}

/* ── watchNow ─────────────────────────────────────────────────── */
async function watchNow(tmdbId,btn){
  // use cache so repeat clicks are instant
  if(imdbCache[tmdbId]){
    window.open(`https://www.playimdb.com/title/${imdbCache[tmdbId]}`,"_blank","noreferrer");
    return;
  }
  const orig=btn.textContent;
  btn.textContent="…";btn.disabled=true;
  try{
    const d=await api(`/movie/${tmdbId}`);
    if(d.imdb_id){
      imdbCache[tmdbId]=d.imdb_id;
      window.open(`https://www.playimdb.com/title/${d.imdb_id}`,"_blank","noreferrer");
    }
  }catch(e){}
  btn.textContent=orig;btn.disabled=false;
}

/* ── modal ────────────────────────────────────────────────────── */
let mData=null,mTab="info";

async function openModal(id){
  document.getElementById("modal").style.display="flex";
  document.body.style.overflow="hidden";
  document.getElementById("modal-body").innerHTML='<div class="loader">Loading…</div>';
  document.getElementById("modal-img").querySelector("img")?.remove();
  const d=await api(`/movie/${id}?append_to_response=credits,images,videos`);
  mData=d;mTab="info";
  if(d.backdrop_path){
    const img=document.createElement("img");
    img.src=iurl(d.backdrop_path,"w1280");img.alt="";
    img.style.cssText="width:100%;height:100%;object-fit:cover;object-position:center 20%";
    document.getElementById("modal-img").insertBefore(img,document.getElementById("modal-img").firstChild);
  }
  renderModal();
}

function renderModal(){
  const d=mData;if(!d)return;
  const poster=iurl(d.poster_path,"w342");
  const trailer=(d.videos?.results||[]).find(v=>v.type==="Trailer"&&v.site==="YouTube");
  const genres=d.genres||[];
  document.getElementById("modal-body").innerHTML=`
    <div class="modal-head">
      ${poster
        ?`<img class="modal-poster" src="${poster}" alt=""/>`
        :`<div class="modal-poster-ph">🎬</div>`}
      <div style="padding-bottom:6px;min-width:0">
        <div class="modal-title">${d.title||""}</div>
        <div class="modal-meta">
          <span style="color:#f5c518;font-size:13px">★ ${fmt(d.vote_average)}</span>
          <span style="font-size:12px;color:#666">${(d.vote_count||0).toLocaleString()} votes</span>
          <span style="font-size:12px;color:#888">${yr(d.release_date)}</span>
          ${d.runtime?`<span style="font-size:12px;color:#888">${rt(d.runtime)}</span>`:""}
          ${d.imdb_id?`<a class="badge-imdb" href="https://www.imdb.com/title/${d.imdb_id}/" target="_blank" rel="noreferrer">IMDb ↗</a>`:""}
          ${trailer?`<a class="badge-trailer" href="https://youtube.com/watch?v=${trailer.key}" target="_blank" rel="noreferrer">▶ Trailer</a>`:""}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${genres.map(g=>`<span class="genre-chip">${g.name}</span>`).join("")}</div>
        ${d.imdb_id?`
        <a id="modal-watch" class="watch-big" href="https://www.playimdb.com/title/${d.imdb_id}" target="_blank" rel="noreferrer">
          ▶ Watch Now
        </a>
        <div style="font-size:10px;color:#444;margin-top:6px;line-height:1.5">
          ⓘ Streamed via a publicly available third-party source.<br/>This site does not host or store any video content.
        </div>`:""}
      </div>
    </div>
    <div class="tabs hide-scroll">
      ${["info","cast","images"].map(t=>`<button class="tab ${mTab===t?"active":""}" onclick="switchTab('${t}')">${t}</button>`).join("")}
    </div>
    <div id="tab-body">${tabHtml()}</div>`;
}

function tabHtml(){
  const d=mData;
  if(mTab==="info"){
    const rows=[
      ["Status",d.status],
      ["Language",d.original_language?.toUpperCase()],
      ["Budget",d.budget>0?`$${(d.budget/1e6).toFixed(1)}M`:null],
      ["Revenue",d.revenue>0?`$${(d.revenue/1e6).toFixed(1)}M`:null],
      ["Studio",(d.production_companies||[]).slice(0,2).map(c=>c.name).join(", ")||null],
      ["Country",(d.production_countries||[]).map(c=>c.name).join(", ")||null],
    ].filter(r=>r[1]);
    return`
      <p style="font-size:13px;color:#bbb;line-height:1.85;margin-bottom:18px">${d.overview||"No overview available."}</p>
      <div class="info-grid">${rows.map(([k,v])=>`<div class="info-box"><div class="info-label">${k}</div><div class="info-val">${v}</div></div>`).join("")}</div>`;
  }
  if(mTab==="cast"){
    const cast=(d.credits?.cast||[]).slice(0,12);
    if(!cast.length)return'<p style="color:#555;font-size:13px">No cast data.</p>';
    return`<div class="cast-grid">${cast.map(c=>`
      <div class="cast-item">
        ${c.profile_path?`<img class="cast-img" src="${iurl(c.profile_path,"w185")}" alt="${c.name}" loading="lazy"/>`:`<div class="cast-ph">👤</div>`}
        <div class="cast-name">${c.name}</div>
        <div class="cast-char">${c.character||""}</div>
      </div>`).join("")}</div>`;
  }
  if(mTab==="images"){
    const bds=(d.images?.backdrops||[]).slice(0,10);
    if(!bds.length)return'<p style="color:#555;font-size:13px">No images.</p>';
    return`<div class="img-grid">${bds.map(b=>`<img src="${iurl(b.file_path,"w300")}" alt="" loading="lazy"/>`).join("")}</div>`;
  }
  return"";
}

function switchTab(t){
  mTab=t;
  document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("active",el.textContent.trim()===t));
  document.getElementById("tab-body").innerHTML=tabHtml();
}

function hideModal(){
  document.getElementById("modal").style.display="none";
  document.body.style.overflow="";
  mData=null;
}
function closeBg(e){if(e.target===document.getElementById("modal"))hideModal();}

/* ── search ───────────────────────────────────────────────────── */
let sTimer=null;
function onSearch(q){
  clearTimeout(sTimer);
  if(!q.trim()){clearSearch();return;}
  document.getElementById("clear-btn").style.display="block";
  sTimer=setTimeout(async()=>{
    const d=await api(`/search/movie?query=${encodeURIComponent(q)}`);
    const movies=d.results||[];
    document.getElementById("app").innerHTML=`
      <h2 style="font-family:'Playfair Display',serif;font-size:18px;color:#fff;margin-bottom:18px">Results for "${q}"</h2>
      ${movies.length?`<div class="search-grid">${movies.map(cardHtml).join("")}</div>`:'<p style="color:#555;font-size:13px">No results found.</p>'}`;
  },380);
}
function clearSearch(){
  document.getElementById("search-input").value="";
  document.getElementById("clear-btn").style.display="none";
  init();
}

init();
</script>
</body>
</html>
